services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "7071:7071"
    environment:
      KAFKA_KRAFT_MODE: "true"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      CLUSTER_ID: "${CLUSTER_ID}"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "${REPLICATION_FACTOR}"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "${REPLICATION_FACTOR}"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "${REPLICATION_FACTOR}"
      KAFKA_OPTS: "-javaagent:/jmx_prometheus_javaagent.jar=7071:/jmx_config.yml"
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./monitoring/jmx_prometheus_javaagent.jar:/jmx_prometheus_javaagent.jar
      - ./monitoring/jmx_config.yml:/jmx_config.yml

  weather-production:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - kafka
    ports:
      - "${PRODUCER_PORT}:${PRODUCER_PORT}"
    environment:
      KAFKA_BROKERS: "${KAFKA_BROKERS}"
      KAFKA_TOPIC: "${KAFKA_TOPIC}"
      PRODUCER_PORT: "${PRODUCER_PORT}"
      WEATHER_API_URL: "${WEATHER_API_URL}"
      WEATHER_API_USER_AGENT: "${WEATHER_API_USER_AGENT}"
    restart: on-failure

  weather-consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    depends_on:
      - kafka
    ports:
      - "${CONSUMER_PORT}:${CONSUMER_PORT}"
    environment:
      KAFKA_BROKERS: "${KAFKA_BROKERS}"
      KAFKA_TOPIC: "${KAFKA_TOPIC}"
      GROUP_ID: "${GROUP_ID}"
      CONSUMER_PORT: "${CONSUMER_PORT}"
    restart: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "${KAFKA_UI_PORT}:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "${KAFKA_BROKERS}"

  prometheus:
    image: prom/prometheus:v2.40.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - kafka

  grafana:
    image: grafana/grafana:9.5.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8085:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped

volumes:
  kafka_data:
  grafana_data: