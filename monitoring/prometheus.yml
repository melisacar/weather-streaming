global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'kafka'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['kafka:7071']
  - job_name: 'producer'
    static_configs:
      - targets: ['weather-production:8000']
  - job_name: 'consumer'
    static_configs:
      - targets: ['weather-consumer:8001']