global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:7071']
  - job_name: 'producer'
    static_configs:
      - targets: ['weather-production:8000']
  - job_name: 'consumer'
    static_configs:
      - targets: ['weather-consumer:8001']
   # Node exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor (container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8085']