lowercaseOutputName: true
rules:
  - pattern: 'kafka.server<type=(.+), name=(.+)PerSec\w*><>Count'
    name: 'kafka_server_$1_$2PerSec'

  - pattern: 'kafka.server<type=(.+), name=(.+)PerSec\w*><>MeanRate'
    name: 'kafka_server_$1_$2PerSec_mean_rate'

  - pattern: 'kafka.server<type=(.+), name=(.+)PerSec\w*><>OneMinuteRate'
    name: 'kafka_server_$1_$2PerSec_one_minute_rate'

  - pattern: 'kafka.server<type=(.+), name=(.+)><>Value'
    name: 'kafka_server_$1_$2'
